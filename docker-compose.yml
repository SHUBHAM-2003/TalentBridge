services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: talentbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/talentbridge
      JWT_SECRET: super_secret_jwt_key_talentbridge_2024
      JWT_REFRESH_SECRET: super_secret_refresh_key_talentbridge_2024
      CLIENT_URL: http://localhost:3000
      PORT: 5000
      NODE_ENV: development
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASS: ""
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build: ./client
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:
